name: Pipeline DevSecOps

on: 
  workflow_dispatch:
  pull_request:
    branches: [master]

jobs:
  secret_scanning: 
    name: secret scan
    runs-on: ubuntu-latest
    steps:
    - name: Descargar código
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        
    - name: Gitleaks
      uses: gitleaks/gitleaks-actions@v3.0.0

  dependency_scan:
    name: SCA Scan
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v6

      - name: Instalar dependencias
        run: npm install

      - name: Análisis SCA
        run: npm audit
        
    
